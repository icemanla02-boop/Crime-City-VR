<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRIME CITY VR</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; overflow:hidden; font-family:'Rajdhani',sans-serif; cursor:crosshair; }
  #canvas { display:block; width:100vw; height:100vh; }

  #title-screen {
    position:fixed; inset:0; background:#000; z-index:100;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
  }
  #title-screen h1 {
    font-family:'Bebas Neue',sans-serif;
    font-size:clamp(60px,12vw,140px);
    letter-spacing:8px; color:#fff; line-height:0.85; text-align:center;
  }
  #title-screen h1 span { display:block; color:#ffb400; font-size:0.45em; letter-spacing:20px; }
  #title-line { width:80%; height:3px; background:linear-gradient(90deg,transparent,#ffb400,transparent); margin:20px 0; }
  #title-screen p { font-size:13px; letter-spacing:4px; color:rgba(255,255,255,0.5); text-transform:uppercase; margin-top:20px; }

  .btn {
    margin-top:24px; padding:14px 50px;
    background:#ffb400; border:none;
    font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:4px; color:#000;
    cursor:pointer; transition:all .2s;
    clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);
  }
  .btn:hover { background:#fff; transform:scale(1.05); }
  .btn:disabled { opacity:0.35; cursor:not-allowed; transform:none; background:#ffb400; }

  #vr-status { margin-top:14px; font-size:12px; letter-spacing:3px; color:rgba(255,180,0,0.7); font-family:'Rajdhani',sans-serif; }

  #hud { position:fixed; inset:0; z-index:20; pointer-events:none; display:flex; flex-direction:column; justify-content:space-between; padding:20px 30px; }
  #hud-top { display:flex; justify-content:space-between; align-items:flex-start; }
  #hud-bottom { display:flex; justify-content:space-between; align-items:flex-end; }
  .hud-panel { background:rgba(0,0,0,0.6); border:1px solid rgba(255,180,0,0.4); padding:10px 16px; backdrop-filter:blur(4px); }
  .hud-label { font-family:'Bebas Neue',sans-serif; font-size:11px; letter-spacing:3px; color:rgba(255,180,0,0.7); display:block; margin-bottom:2px; }
  .hud-value { font-family:'Bebas Neue',sans-serif; font-size:28px; color:#fff; letter-spacing:2px; }
  #health-bar-wrap { width:160px; height:6px; background:rgba(255,255,255,0.15); margin-top:6px; border-radius:1px; }
  #health-bar { height:100%; width:80%; background:linear-gradient(90deg,#00ff88,#00cc66); border-radius:1px; transition:width .3s; }
  #wanted-stars { display:flex; gap:4px; margin-top:4px; }
  .star { font-size:18px; color:rgba(255,180,0,0.25); transition:color .3s,text-shadow .3s; }
  .star.active { color:#ffb400; text-shadow:0 0 12px #ffb400,0 0 24px #ff8800; }
  #minimap { width:120px; height:120px; border:1px solid rgba(255,180,0,0.4); background:rgba(0,0,0,0.7); position:relative; overflow:hidden; }
  #minimap canvas { width:100%; height:100%; }

  #crosshair { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:25; pointer-events:none; }
  .ch-ring { width:32px; height:32px; border:2px solid rgba(255,255,255,0.8); border-radius:50%; position:relative; }
  .ch-ring::before,.ch-ring::after { content:''; position:absolute; background:rgba(255,255,255,0.8); }
  .ch-ring::before { width:10px;height:2px;top:50%;left:50%;transform:translate(-50%,-50%); }
  .ch-ring::after  { width:2px;height:10px;top:50%;left:50%;transform:translate(-50%,-50%); }

  #event-log { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:50; font-family:'Bebas Neue',sans-serif; font-size:48px; letter-spacing:6px; color:#ffb400; text-shadow:0 0 30px #ff8800; pointer-events:none; opacity:0; transition:opacity .3s; text-align:center; }
  #score-popup { position:fixed; top:40%; left:50%; transform:translateX(-50%); z-index:50; font-family:'Bebas Neue',sans-serif; font-size:36px; letter-spacing:4px; color:#00ff88; text-shadow:0 0 20px #00ff88; pointer-events:none; opacity:0; }
  #scanlines { position:fixed; inset:0; background:repeating-linear-gradient(to bottom,transparent 0px,transparent 3px,rgba(0,0,0,0.07) 3px,rgba(0,0,0,0.07) 4px); pointer-events:none; z-index:9; }
  #controls-hint { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); z-index:30; display:flex; gap:14px; pointer-events:none; flex-wrap:wrap; justify-content:center; }
  .ctrl { background:rgba(0,0,0,0.6); border:1px solid rgba(255,180,0,0.3); padding:6px 12px; font-size:11px; letter-spacing:2px; color:rgba(255,255,255,0.5); font-family:'Rajdhani',sans-serif; }
  .ctrl strong { color:#ffb400; font-weight:700; }
</style>
</head>
<body>

<div id="title-screen">
  <h1><span>Crime City</span>VR</h1>
  <div id="title-line"></div>
  <p>A GTA-Inspired WebXR Experience</p>
  <button class="btn" id="desktop-btn" onclick="startDesktop()">PLAY ON SCREEN</button>
  <button class="btn" id="vr-btn" onclick="startVR()" disabled>ENTER VR (QUEST)</button>
  <div id="vr-status">Checking WebXR support…</div>
</div>

<canvas id="canvas"></canvas>
<div id="scanlines"></div>
<div id="crosshair"><div class="ch-ring"></div></div>

<div id="hud">
  <div id="hud-top">
    <div class="hud-panel">
      <span class="hud-label">Health</span>
      <span class="hud-value" id="health-val">80</span>
      <div id="health-bar-wrap"><div id="health-bar"></div></div>
    </div>
    <div class="hud-panel" style="text-align:center">
      <span class="hud-label">Score</span>
      <span class="hud-value" id="score-val">0</span>
    </div>
    <div class="hud-panel" style="text-align:right">
      <span class="hud-label">Wanted</span>
      <div id="wanted-stars">
        <span class="star">★</span><span class="star">★</span><span class="star">★</span>
        <span class="star">★</span><span class="star">★</span>
      </div>
    </div>
  </div>
  <div id="hud-bottom">
    <div class="hud-panel"><span class="hud-label">Speed</span><span class="hud-value" id="speed-val">0 mph</span></div>
    <div id="minimap"><canvas id="minimap-canvas" width="120" height="120"></canvas></div>
  </div>
</div>

<div id="event-log"></div>
<div id="score-popup"></div>
<div id="controls-hint">
  <div class="ctrl"><strong>WASD</strong> Move</div>
  <div class="ctrl"><strong>Mouse</strong> Look</div>
  <div class="ctrl"><strong>Click</strong> Shoot</div>
  <div class="ctrl"><strong>Space</strong> Jump</div>
  <div class="ctrl" id="vr-hint" style="display:none"><strong>L-Stick</strong> Walk &nbsp;|&nbsp; <strong>R-Trigger</strong> Shoot &nbsp;|&nbsp; <strong>L-Trigger</strong> Jump</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ──────────────────────────────────────────────
//  CRIME CITY VR — WebXR Quest + Desktop
// ──────────────────────────────────────────────

let scene, renderer, clock;
let camera;
let gameStarted = false;
let isXR = false;
let xrSession = null;

// XR controllers
let ctrlRight = null, ctrlLeft = null;
let prevRightTrigger = false, prevLeftTrigger = false;

// Player state
const player = {
  pos: new THREE.Vector3(0, 0, 0),   // ground level; eye height applied separately
  vel: new THREE.Vector3(),
  yaw: 0, pitch: 0,
  health: 80,
  onGround: true
};
const EYE_HEIGHT = 1.7;

// Desktop input
const keys = {};
let mouseDX = 0, mouseDY = 0, pointerLocked = false;

// Game state
let score = 0, wantedLevel = 0;
const buildings = [], npcs = [], bullets = [], cars = [], particles = [];

// ──────────────────────────────────────────────
//  WebXR availability
// ──────────────────────────────────────────────
(async () => {
  const status = document.getElementById('vr-status');
  const vrBtn  = document.getElementById('vr-btn');
  if (!navigator.xr) {
    status.textContent = 'navigator.xr not found — open in Quest Browser or Chrome with WebXR flag';
    return;
  }
  try {
    const ok = await navigator.xr.isSessionSupported('immersive-vr');
    if (ok) {
      vrBtn.disabled = false;
      status.textContent = '✓ WebXR ready — tap ENTER VR';
      status.style.color = '#00ff88';
    } else {
      status.textContent = 'immersive-vr not supported in this browser';
    }
  } catch(e) {
    status.textContent = 'XR check failed: ' + e.message;
  }
})();

// ──────────────────────────────────────────────
//  Entry points
// ──────────────────────────────────────────────
function startDesktop() {
  document.getElementById('title-screen').style.display = 'none';
  isXR = false;
  initEngine();
  gameStarted = true;
  document.getElementById('canvas').requestPointerLock();
  renderer.setAnimationLoop(desktopLoop);
}

async function startVR() {
  document.getElementById('title-screen').style.display = 'none';
  isXR = true;
  initEngine();

  try {
    xrSession = await navigator.xr.requestSession('immersive-vr', {
      requiredFeatures: ['local-floor'],
      optionalFeatures: ['bounded-floor', 'hand-tracking']
    });
  } catch(e) {
    alert('Could not start VR session: ' + e.message);
    document.getElementById('title-screen').style.display = 'flex';
    return;
  }

  await renderer.xr.setSession(xrSession);
  renderer.xr.setReferenceSpaceType('local-floor');

  xrSession.addEventListener('end', () => {
    xrSession = null; gameStarted = false;
    document.getElementById('title-screen').style.display = 'flex';
  });

  // Hide flat DOM HUD — we use 3-D HUD panels instead
  document.getElementById('hud').style.display = 'none';
  document.getElementById('crosshair').style.display = 'none';
  document.getElementById('scanlines').style.display = 'none';
  document.getElementById('controls-hint').style.display = 'none';
  document.getElementById('vr-hint').style.display = 'flex';

  buildXRControllers();
  build3DHUD();

  gameStarted = true;
  renderer.setAnimationLoop(xrLoop);
}

// ──────────────────────────────────────────────
//  Engine init
// ──────────────────────────────────────────────
function initEngine() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x080810);
  scene.fog = new THREE.FogExp2(0x080810, 0.015);

  clock = new THREE.Clock();

  renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.xr.enabled = true;

  // Single camera — in WebXR the engine handles stereo automatically
  camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.05, 400);
  scene.add(camera); // needed so XR camera group is part of scene

  buildCity();
  buildLighting();
  spawnNPCs(14);
  spawnCars(7);

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  if (!isXR) {
    document.addEventListener('keydown', e => keys[e.code] = true);
    document.addEventListener('keyup',   e => { keys[e.code] = false; });
    document.addEventListener('mousemove', e => {
      if (pointerLocked) { mouseDX += e.movementX; mouseDY += e.movementY; }
    });
    document.addEventListener('click', () => {
      if (!pointerLocked) { document.getElementById('canvas').requestPointerLock(); return; }
      shoot();
    });
    document.addEventListener('pointerlockchange', () => {
      pointerLocked = document.pointerLockElement === document.getElementById('canvas');
    });
  }
}

// ──────────────────────────────────────────────
//  XR Controllers
// ──────────────────────────────────────────────
function buildXRControllers() {
  // getController(0) = right, getController(1) = left on Quest by convention
  ctrlRight = renderer.xr.getController(0);
  ctrlLeft  = renderer.xr.getController(1);
  scene.add(ctrlRight);
  scene.add(ctrlLeft);

  [ctrlRight, ctrlLeft].forEach(ctrl => {
    // Controller body
    const body = new THREE.Mesh(
      new THREE.CylinderGeometry(0.012, 0.015, 0.12, 8),
      new THREE.MeshLambertMaterial({ color: 0x222233 })
    );
    body.rotation.x = Math.PI / 2;
    ctrl.add(body);

    // Aim ray
    const pts = [new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,-15)];
    const ray = new THREE.Line(
      new THREE.BufferGeometry().setFromPoints(pts),
      new THREE.LineBasicMaterial({ color: 0xffb400, opacity: 0.35, transparent: true })
    );
    ctrl.add(ray);
  });
}

// ──────────────────────────────────────────────
//  3-D HUD (attached to camera so it follows head)
// ──────────────────────────────────────────────
let hudGroup, hudPanels = {};

function makeHUDCanvas(label, value) {
  const cv = document.createElement('canvas');
  cv.width = 300; cv.height = 90;
  const ctx = cv.getContext('2d');
  drawHUDCanvas(ctx, label, value);
  return { cv, ctx };
}

function drawHUDCanvas(ctx, label, value) {
  ctx.clearRect(0, 0, 300, 90);
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.strokeStyle = 'rgba(255,180,0,0.5)';
  ctx.lineWidth = 2;
  ctx.fillRect(0,0,300,90);
  ctx.strokeRect(1,1,298,88);
  ctx.fillStyle = '#ffb400';
  ctx.font = 'bold 16px monospace';
  ctx.fillText(label, 12, 26);
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 34px monospace';
  ctx.fillText(String(value), 12, 72);
}

function build3DHUD() {
  hudGroup = new THREE.Group();
  // Position below the horizon, slightly in front
  hudGroup.position.set(0, -0.28, -0.65);
  camera.add(hudGroup);

  const defs = [
    { id:'health', label:'HEALTH', val:80,     x:-0.25, y:0 },
    { id:'score',  label:'SCORE',  val:0,      x: 0,    y:0 },
    { id:'wanted', label:'WANTED', val:'☆☆☆☆☆', x: 0.25, y:0 }
  ];

  defs.forEach(d => {
    const { cv, ctx } = makeHUDCanvas(d.label, d.val);
    const tex = new THREE.CanvasTexture(cv);
    const mesh = new THREE.Mesh(
      new THREE.PlaneGeometry(0.18, 0.055),
      new THREE.MeshBasicMaterial({ map: tex, transparent: true, depthTest: false, depthWrite: false })
    );
    mesh.position.set(d.x, d.y, 0);
    hudGroup.add(mesh);
    hudPanels[d.id] = { mesh, cv, ctx, label: d.label, tex };
  });

  // Central reticle dot
  const dot = new THREE.Mesh(
    new THREE.RingGeometry(0.003, 0.007, 20),
    new THREE.MeshBasicMaterial({ color: 0xffffff, depthTest: false, depthWrite: false })
  );
  dot.position.set(0, 0.16, 0);
  hudGroup.add(dot);
}

function updateXRHUD() {
  if (!hudGroup) return;
  const refresh = (id, value) => {
    const p = hudPanels[id];
    if (!p) return;
    drawHUDCanvas(p.ctx, p.label, value);
    p.tex.needsUpdate = true;
  };
  refresh('health', Math.floor(player.health));
  refresh('score',  score);
  const stars = '★'.repeat(wantedLevel) + '☆'.repeat(5 - wantedLevel);
  refresh('wanted', stars);
}

// ──────────────────────────────────────────────
//  City
// ──────────────────────────────────────────────
function buildCity() {
  const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(400, 400),
    new THREE.MeshLambertMaterial({ color: 0x111118 })
  );
  ground.rotation.x = -Math.PI / 2;
  ground.receiveShadow = true;
  scene.add(ground);

  for (let i = -150; i <= 150; i += 30) {
    addRoadLine(i, true);
    addRoadLine(i, false);
  }

  const bColors = [0x1a1a2e,0x16213e,0x0f3460,0x1a1a35,0x222240,0x0d1b2a];
  const aColors = [0xffb400,0xff4444,0x00ccff,0x00ff88,0xff6600];

  for (let gx = -5; gx <= 5; gx++) {
    for (let gz = -5; gz <= 5; gz++) {
      if (Math.abs(gx) < 1 && Math.abs(gz) < 1) continue;
      const x = gx*30 + (Math.random()-.5)*8;
      const z = gz*30 + (Math.random()-.5)*8;
      const w = 6 + Math.random()*10;
      const d = 6 + Math.random()*10;
      const h = 8 + Math.random()*45;
      const color = bColors[Math.floor(Math.random()*bColors.length)];

      const b = new THREE.Mesh(
        new THREE.BoxGeometry(w, h, d),
        new THREE.MeshLambertMaterial({ color })
      );
      b.position.set(x, h/2, z);
      b.castShadow = true; b.receiveShadow = true;
      scene.add(b);
      buildings.push({ x, z, w, d, h });

      if (Math.random() > 0.4) {
        const ac = aColors[Math.floor(Math.random()*aColors.length)];
        const ledge = new THREE.Mesh(
          new THREE.BoxGeometry(w+.2, .3, d+.2),
          new THREE.MeshBasicMaterial({ color: ac })
        );
        ledge.position.set(x, h+.15, z);
        scene.add(ledge);
        const pl = new THREE.PointLight(ac, .6, 20);
        pl.position.set(x, h+1, z);
        scene.add(pl);
      }
      addWindowsToBuilding(x, z, w, d, h);
    }
  }

  for (let i = -120; i <= 120; i += 30) {
    for (let j = -120; j <= 120; j += 30) {
      addStreetLamp(i+12, j);
      addStreetLamp(i, j+12);
    }
  }
}

function addWindowsToBuilding(x, z, w, d, h) {
  const cols = Math.floor(w/2.5), rows = Math.floor(h/3);
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (Math.random() > 0.55) continue;
      const wx = x - w/2 + (c+.5)*(w/cols);
      const win = new THREE.Mesh(
        new THREE.PlaneGeometry(.8, 1.2),
        new THREE.MeshBasicMaterial({ color: Math.random()>.3 ? (Math.random()>.5?0xffffcc:0xccffff) : 0x111122 })
      );
      win.position.set(wx, 2+r*3, z+d/2+.01);
      scene.add(win);
    }
  }
}

function addRoadLine(pos, horiz) {
  const line = new THREE.Mesh(
    new THREE.PlaneGeometry(horiz?400:.3, horiz?.3:400),
    new THREE.MeshBasicMaterial({ color:0xffb400, opacity:.1, transparent:true })
  );
  line.rotation.x = -Math.PI/2;
  line.position.set(horiz?0:pos, .01, horiz?pos:0);
  scene.add(line);
}

function addStreetLamp(x, z) {
  const pole = new THREE.Mesh(new THREE.CylinderGeometry(.08,.08,5,6), new THREE.MeshLambertMaterial({color:0x333344}));
  pole.position.set(x,2.5,z); scene.add(pole);
  const bulb = new THREE.Mesh(new THREE.SphereGeometry(.25,6,6), new THREE.MeshBasicMaterial({color:0xffeeaa}));
  bulb.position.set(x,5.2,z); scene.add(bulb);
  const pl = new THREE.PointLight(0xffeeaa,.5,22);
  pl.position.set(x,5.2,z); scene.add(pl);
}

function buildLighting() {
  scene.add(new THREE.AmbientLight(0x111133, 1.0));
  const moon = new THREE.DirectionalLight(0x334466, .5);
  moon.position.set(50,80,30);
  moon.castShadow = true;
  moon.shadow.mapSize.set(2048,2048);
  Object.assign(moon.shadow.camera, {near:.5,far:300,left:-120,right:120,top:120,bottom:-120});
  scene.add(moon);

  const sg = new THREE.BufferGeometry();
  const sv = [];
  for (let i=0;i<2000;i++) sv.push((Math.random()-.5)*600,80+Math.random()*120,(Math.random()-.5)*600);
  sg.setAttribute('position', new THREE.Float32BufferAttribute(sv,3));
  scene.add(new THREE.Points(sg, new THREE.PointsMaterial({color:0xffffff,size:.35})));
}

// ──────────────────────────────────────────────
//  NPCs & Cars
// ──────────────────────────────────────────────
function spawnNPCs(count) {
  const colors = [0xff4444,0x4488ff,0x44cc44,0xffaa00,0xcc44ff];
  for (let i=0;i<count;i++) {
    const mat = new THREE.MeshLambertMaterial({color:colors[i%colors.length]});
    const body = new THREE.Mesh(new THREE.CylinderGeometry(.25,.25,1.6,8), mat);
    const head = new THREE.Mesh(new THREE.SphereGeometry(.22,8,8), mat);
    head.position.y = 1.1; body.add(head);
    const angle = Math.random()*Math.PI*2, dist = 10+Math.random()*60;
    body.position.set(Math.cos(angle)*dist, .8, Math.sin(angle)*dist);
    body.castShadow = true;
    scene.add(body);
    npcs.push({
      mesh:body, alive:true, health:3,
      vel:new THREE.Vector3((Math.random()-.5)*.04,0,(Math.random()-.5)*.04),
      dir:new THREE.Vector3()
    });
  }
}

function spawnCars(count) {
  const carColors=[0xff2244,0x2244ff,0x22cc44,0xffcc00,0xffffff,0xff6600];
  for (let i=0;i<count;i++) {
    const color = carColors[Math.floor(Math.random()*carColors.length)];
    const body = new THREE.Mesh(new THREE.BoxGeometry(2,.9,4), new THREE.MeshLambertMaterial({color}));
    const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.6,.7,2.2), new THREE.MeshLambertMaterial({color:0x111122}));
    cabin.position.set(0,.8,-.3); body.add(cabin);
    const wm = new THREE.MeshLambertMaterial({color:0x111111});
    [[-1,-1.5],[-1,1.5],[1,-1.5],[1,1.5]].forEach(([sx,sz])=>{
      const w=new THREE.Mesh(new THREE.CylinderGeometry(.35,.35,.25,10),wm);
      w.rotation.z=Math.PI/2; w.position.set(sx*1.1,-.4,sz); body.add(w);
    });
    const angle=Math.random()*Math.PI*2, dist=15+Math.random()*50;
    body.position.set(Math.cos(angle)*dist,.5,Math.sin(angle)*dist);
    body.castShadow=true; scene.add(body);
    cars.push({mesh:body, direction:angle, speed:.03+Math.random()*.05, alive:true});
  }
}

// ──────────────────────────────────────────────
//  Shooting
// ──────────────────────────────────────────────
function shoot() {
  // In XR, shoot along right controller's forward; in desktop, along camera
  let dir = new THREE.Vector3(0,0,-1);
  if (isXR && ctrlRight) {
    ctrlRight.getWorldDirection(dir);
    dir.negate();
  } else {
    dir.applyQuaternion(camera.quaternion);
  }

  const bullet = new THREE.Mesh(
    new THREE.SphereGeometry(.09,4,4),
    new THREE.MeshBasicMaterial({color:0xffff00})
  );
  // Start from eye position
  const origin = isXR ? ctrlRight.getWorldPosition(new THREE.Vector3()) : player.pos.clone().setY(player.pos.y + EYE_HEIGHT);
  bullet.position.copy(origin);
  bullet.add(new THREE.PointLight(0xffff00,2,8));
  scene.add(bullet);
  bullets.push({mesh:bullet, vel:dir.clone().multiplyScalar(1.4), life:80});

  spawnParticles(origin, 0xffff00, 5);
  wantedLevel = Math.min(5, wantedLevel+1);
  updateWantedUI();
  showEvent('+1 WANTED');
}

function spawnParticles(pos, color, count) {
  for (let i=0;i<count;i++) {
    const p = new THREE.Mesh(
      new THREE.SphereGeometry(.05,3,3),
      new THREE.MeshBasicMaterial({color, transparent:true})
    );
    p.position.copy(pos);
    scene.add(p);
    particles.push({
      mesh:p,
      vel:new THREE.Vector3((Math.random()-.5)*.15, Math.random()*.1, (Math.random()-.5)*.15),
      life:20+Math.random()*20
    });
  }
}

// ──────────────────────────────────────────────
//  UI helpers
// ──────────────────────────────────────────────
let eventTO;
function showEvent(text) {
  const el = document.getElementById('event-log');
  el.textContent=text; el.style.opacity='1';
  clearTimeout(eventTO);
  eventTO=setTimeout(()=>el.style.opacity='0',1500);
}
function addScore(pts) {
  score+=pts;
  document.getElementById('score-val').textContent=score.toLocaleString();
  const popup=document.getElementById('score-popup');
  popup.textContent='+'+pts; popup.style.opacity='1'; popup.style.transition='none'; popup.style.top='40%';
  setTimeout(()=>{popup.style.transition='opacity .5s,top .5s';popup.style.opacity='0';popup.style.top='32%';},600);
}
function updateWantedUI() {
  document.querySelectorAll('.star').forEach((s,i)=>s.classList.toggle('active',i<wantedLevel));
}

// ──────────────────────────────────────────────
//  Collision
// ──────────────────────────────────────────────
function checkBuildingCollision(p) {
  for (const b of buildings) {
    if (Math.abs(p.x-b.x)<b.w/2+.5 && Math.abs(p.z-b.z)<b.d/2+.5) return true;
  }
  return false;
}

// ──────────────────────────────────────────────
//  Minimap
// ──────────────────────────────────────────────
function drawMinimap() {
  const mc=document.getElementById('minimap-canvas');
  const ctx=mc.getContext('2d');
  const W=120,H=120,sc=W/60;
  ctx.fillStyle='#090912'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#1a1a35';
  buildings.forEach(b=>{
    ctx.fillRect(W/2+(b.x-player.pos.x)*sc*.5-b.w*sc*.25, H/2+(b.z-player.pos.z)*sc*.5-b.d*sc*.25, b.w*sc*.5, b.d*sc*.5);
  });
  ctx.fillStyle='#ff4444';
  npcs.forEach(n=>{if(!n.alive)return;ctx.fillRect(W/2+(n.mesh.position.x-player.pos.x)*sc*.5-1,H/2+(n.mesh.position.z-player.pos.z)*sc*.5-1,3,3);});
  ctx.fillStyle='#ffb400';
  cars.forEach(c=>{if(!c.alive)return;ctx.fillRect(W/2+(c.mesh.position.x-player.pos.x)*sc*.5-2,H/2+(c.mesh.position.z-player.pos.z)*sc*.5-1,5,3);});
  ctx.fillStyle='#00ff88'; ctx.beginPath(); ctx.arc(W/2,H/2,3,0,Math.PI*2); ctx.fill();
}

// ──────────────────────────────────────────────
//  XR gamepad polling
// ──────────────────────────────────────────────
function pollXRInput() {
  if (!xrSession) return { lx:0, ly:0, rightShoot:false, leftJump:false };
  let lx=0,ly=0,rightShoot=false,leftJump=false;
  for (const src of xrSession.inputSources) {
    if (!src.gamepad) continue;
    const btns = src.gamepad.buttons;
    const axes = src.gamepad.axes;
    if (src.handedness === 'left') {
      lx = axes[2]||0;
      ly = axes[3]||0;
      // A/X button (index 4 on Quest) or grip (2) to jump
      const trigger = btns[0]?.pressed || btns[0]?.value > 0.5;
      if (trigger && !prevLeftTrigger) leftJump = true;
      prevLeftTrigger = trigger;
    }
    if (src.handedness === 'right') {
      const trigger = btns[0]?.pressed || btns[0]?.value > 0.5;
      if (trigger && !prevRightTrigger) rightShoot = true;
      prevRightTrigger = trigger;
    }
  }
  return { lx, ly, rightShoot, leftJump };
}

// ──────────────────────────────────────────────
//  Core update (shared desktop + XR)
// ──────────────────────────────────────────────
function update(dt) {
  if (isXR) {
    const { lx, ly, rightShoot, leftJump } = pollXRInput();

    if (Math.abs(lx)>.12 || Math.abs(ly)>.12) {
      // Move relative to headset look direction (yaw only)
      const xrCam = renderer.xr.getCamera(camera);
      const headYaw = Math.atan2(
        -xrCam.matrixWorld.elements[8],
         xrCam.matrixWorld.elements[10]
      );
      const fwd   = new THREE.Vector3(-Math.sin(headYaw), 0, -Math.cos(headYaw));
      const right = new THREE.Vector3( Math.cos(headYaw), 0, -Math.sin(headYaw));
      player.vel.addScaledVector(fwd,  -ly * .018);
      player.vel.addScaledVector(right,  lx * .018);
    }

    if (rightShoot) shoot();
    if (leftJump && player.onGround) { player.vel.y = .18; player.onGround = false; }

  } else {
    // Desktop look
    player.yaw   -= mouseDX * .002;
    player.pitch  = Math.max(-.8, Math.min(.8, player.pitch - mouseDY*.002));
    mouseDX = mouseDY = 0;

    const fwd   = new THREE.Vector3(-Math.sin(player.yaw), 0, -Math.cos(player.yaw));
    const right = new THREE.Vector3( Math.cos(player.yaw), 0, -Math.sin(player.yaw));
    if (keys['KeyW']||keys['ArrowUp'])    player.vel.addScaledVector(fwd,   .02);
    if (keys['KeyS']||keys['ArrowDown'])  player.vel.addScaledVector(fwd,  -.016);
    if (keys['KeyA']||keys['ArrowLeft'])  player.vel.addScaledVector(right,-.016);
    if (keys['KeyD']||keys['ArrowRight']) player.vel.addScaledVector(right, .016);
    if (keys['Space'] && player.onGround) { player.vel.y=.18; player.onGround=false; }

    camera.quaternion.setFromEuler(new THREE.Euler(player.pitch, player.yaw, 0, 'YXZ'));
  }

  // Physics
  player.vel.x *= .8; player.vel.z *= .8;
  player.vel.y -= .012;

  const next = player.pos.clone().add(player.vel);
  if (next.y < 0) { next.y=0; player.vel.y=0; player.onGround=true; }

  if (!checkBuildingCollision(new THREE.Vector3(next.x, 0, next.z))) {
    player.pos.copy(next);
  } else {
    player.vel.set(0, 0, 0);
  }

  if (isXR) {
    // Move scene so XR camera sits at player.pos
    const xrCam = renderer.xr.getCamera(camera);
    const xrPos = new THREE.Vector3();
    xrCam.getWorldPosition(xrPos);
    // shift scene root so player stays at player.pos
    scene.position.x += player.pos.x - xrPos.x;
    scene.position.z += player.pos.z - xrPos.z;
  } else {
    camera.position.set(player.pos.x, player.pos.y + EYE_HEIGHT, player.pos.z);
  }

  // Speed display (desktop only)
  const spd = Math.round(Math.sqrt(player.vel.x**2+player.vel.z**2)*1000);
  document.getElementById('speed-val').textContent = spd+' mph';

  // Bullets
  for (let i=bullets.length-1;i>=0;i--) {
    const b=bullets[i];
    b.mesh.position.add(b.vel); b.life--;
    for (const npc of npcs) {
      if (!npc.alive) continue;
      if (b.mesh.position.distanceTo(npc.mesh.position)<.9) {
        npc.health--;
        spawnParticles(b.mesh.position.clone(), 0xff2200, 8);
        if (npc.health<=0) { npc.alive=false; scene.remove(npc.mesh); addScore(100+wantedLevel*50); showEvent('ELIMINATED!'); }
        b.life=0; break;
      }
    }
    if (b.life<=0){scene.remove(b.mesh);bullets.splice(i,1);}
  }

  // NPCs
  for (const npc of npcs) {
    if (!npc.alive) continue;
    const dist = npc.mesh.position.distanceTo(player.pos);
    if (dist<22 && wantedLevel>1) {
      npc.dir.subVectors(player.pos, npc.mesh.position).normalize();
      npc.mesh.position.addScaledVector(npc.dir, .03);
      if (dist<1.5) { player.health=Math.max(0,player.health-.05); updateHealthUI(); }
    } else {
      npc.mesh.position.add(npc.vel);
      if (Math.abs(npc.mesh.position.x)>110||Math.abs(npc.mesh.position.z)>110) npc.vel.negate();
    }
    npc.mesh.rotation.y+=.01;
  }

  // Cars
  for (const car of cars) {
    if (!car.alive) continue;
    car.direction+=(Math.random()-.5)*.02;
    car.mesh.position.x+=Math.sin(car.direction)*car.speed;
    car.mesh.position.z+=Math.cos(car.direction)*car.speed;
    car.mesh.rotation.y=car.direction+Math.PI;
    if (Math.abs(car.mesh.position.x)>130||Math.abs(car.mesh.position.z)>130) car.direction+=Math.PI;
    if (car.mesh.position.distanceTo(player.pos)<2) { player.health=Math.max(0,player.health-.15); updateHealthUI(); }
  }

  // Particles
  for (let i=particles.length-1;i>=0;i--) {
    const p=particles[i];
    p.mesh.position.add(p.vel); p.vel.y-=.005; p.life--;
    p.mesh.material.opacity=Math.max(0,p.life/30);
    if(p.life<=0){scene.remove(p.mesh);particles.splice(i,1);}
  }

  // Wanted decay
  if (Math.random()<.002&&wantedLevel>0) { wantedLevel--; updateWantedUI(); }

  if (isXR) updateXRHUD();
  else { drawMinimap(); updateWantedUI(); }
}

function updateHealthUI() {
  document.getElementById('health-val').textContent=Math.floor(player.health);
  document.getElementById('health-bar').style.width=player.health+'%';
}

// ──────────────────────────────────────────────
//  Animation loops
// ──────────────────────────────────────────────
function desktopLoop() {
  update(clock.getDelta());
  renderer.render(scene, camera);
}

function xrLoop(timestamp, frame) {
  // clock.getDelta() must be called once per frame
  const dt = clock.getDelta();
  if (gameStarted) update(dt);
  // renderer.render is called automatically by the WebXR animation loop
  renderer.render(scene, camera);
}
</script>
</body>
</html>
